<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datacenter Information</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Datacenter Information Page</h1>
    <table>
        <tr>
            <th>Server ID</th>
            <th>Status</th>
            <th>Location</th>
            <th>Uptime</th>
        </tr>
        <tr>
            <td>001</td>
            <td>Active</td>
            <td>Data Center A</td>
            <td>99.99%</td>
        </tr>
        <tr>
            <td>002</td>
            <td>Inactive</td>
            <td>Data Center B</td>
            <td>N/A</td>
        </tr>
        <tr>
            <td>003</td>
            <td>Active</td>
            <td>Data Center C</td>
            <td>98.76%</td>
        </tr>
    </table>
</body>
</html>
